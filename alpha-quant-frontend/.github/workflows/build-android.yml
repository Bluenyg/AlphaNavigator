name: Build Android APK

# 当你把代码推送到 main 或 master 分支时，自动触发打包
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 配置 Node.js 环境
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 配置 Java 环境 (Android 编译必需)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 安装前端依赖
      run: npm install

    - name: 打包 Next.js 静态文件
      run: npm run build

    - name: 同步代码到安卓外壳
      run: npx cap sync android

    - name: 编译并生成 APK 文件
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: 上传打包好的 APK 供下载
      uses: actions/upload-artifact@v3
      with:
        name: alpha-quant-app
        path: android/app/build/outputs/apk/debug/app-debug.apk